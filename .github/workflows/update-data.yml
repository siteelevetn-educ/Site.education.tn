name: mise à jour des données

on:
  push:
    paths:
      - 'fichiers/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Generate data.json with teacher names
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const result = {
            images: [],
            videos: {},
            files: {}
          };
          
          // جمع الصور
          const imagesPath = 'fichiers/images';
          if (fs.existsSync(imagesPath)) {
            result.images = fs.readdirSync(imagesPath).filter(f => f.match(/\.(jpg|jpeg|png|gif|webp)$/i));
          }
          
          // دالة لقراءة اسم الأستاذ من ملف .teacher
          function getTeacherName(videoDir, videoName) {
            const teacherPath = path.join(videoDir, videoName.replace(/\.link$/, '') + '.teacher');
            if (fs.existsSync(teacherPath)) {
              try {
                return fs.readFileSync(teacherPath, 'utf8').trim();
              } catch(e) {
                return null;
              }
            }
            return null;
          }
          
          // دالة لفحص المجلدات
          function scanDir(dir, prefix) {
            if (!fs.existsSync(dir)) return;
            const items = fs.readdirSync(dir);
            for (const item of items) {
              const fullPath = path.join(dir, item);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                scanDir(fullPath, prefix ? prefix + '/' + item : item);
              } else if (item !== '.keep' && item !== 'data.json' && !item.endsWith('.teacher')) {
                const key = prefix;
                // فيديوهات وروابط
                if (item.match(/\.(mp4|webm)$/i) || item.endsWith('.link')) {
                  if (!result.videos[key]) result.videos[key] = [];
                  
                  // قراءة اسم الأستاذ من ملف .teacher
                  const teacherName = getTeacherName(dir, item);
                  
                  result.videos[key].push({
                    name: item,
                    teacher: teacherName || 'أستاذ'
                  });
                } 
                // ملفات PDF و Word
                else if (item.match(/\.(pdf|docx)$/i)) {
                  if (!result.files[key]) result.files[key] = [];
                  result.files[key].push(item);
                }
              }
            }
          }
          
          // فحص جميع المستويات
          scanDir('fichiers/primaire', 'primaire');
          scanDir('fichiers/college', 'college');
          scanDir('fichiers/lycee', 'lycee');
          scanDir('fichiers/national', 'national');
          
          fs.writeFileSync('fichiers/data.json', JSON.stringify(result, null, 2));
          console.log('✅ data.json generated with teacher names');
          "
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fichiers/data.json
          git diff --staged --quiet || git commit -m "Update data.json with teacher names"
          git push
