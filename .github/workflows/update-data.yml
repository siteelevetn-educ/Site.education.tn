name: mise à jour des données

on:
  push:
    paths:
      - 'fichiers/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Generate data.json
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const result = {
            images: [],
            videos: {},
            files: {}
          };
          
          // Collect images
          const imagesPath = 'fichiers/images';
          if (fs.existsSync(imagesPath)) {
            result.images = fs.readdirSync(imagesPath).filter(f => f.match(/\.(jpg|jpeg|png|gif|webp)$/i));
          }
          
          // Scan directories
          function scanDir(dir, prefix) {
            if (!fs.existsSync(dir)) return;
            const items = fs.readdirSync(dir);
            for (const item of items) {
              const fullPath = path.join(dir, item);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                scanDir(fullPath, prefix ? prefix + '/' + item : item);
              } else if (item !== '.keep' && item !== 'data.json') {
                const key = prefix;
                if (item.match(/\.(mp4|webm)$/i)) {
                  if (!result.videos[key]) result.videos[key] = [];
                  result.videos[key].push(item);
                } else if (item.match(/\.(pdf|docx)$/i)) {
                  if (!result.files[key]) result.files[key] = [];
                  result.files[key].push(item);
                }
              }
            }
          }
          
          // Scan all levels
          scanDir('fichiers/primaire', 'primaire');
          scanDir('fichiers/college', 'college');
          scanDir('fichiers/lycee', 'lycee');
          scanDir('fichiers/national', 'national');
          
          fs.writeFileSync('fichiers/data.json', JSON.stringify(result, null, 2));
          console.log('✅ data.json generated with:', JSON.stringify(result, null, 2));
          "
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fichiers/data.json
          git diff --staged --quiet || git commit -m "Update data.json"
          git push
