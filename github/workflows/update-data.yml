name: تحديث data.json

on:
  push:
    paths:
      - 'fichiers/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: إنشاء data.json
        run: |
          cat > fichiers/data.json << 'EOF'
          {
            "images": [],
            "videos": {},
            "files": {}
          }
          EOF
          
      - name: حفظ التغييرات
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fichiers/data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث data.json"
          git push
